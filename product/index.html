<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product — Graft Wild</title>
  <link rel="stylesheet" href="/assets/style.css" />
  <style>
    /* ── Nav ─────────────────────────────────────────────── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.25rem 2.5rem;
      background: rgba(19,15,8,0.97);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: var(--font-heading);
      font-size: 1.1rem; font-weight: 700;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--text); text-decoration: none;
    }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a {
      font-size: 0.8rem; font-weight: 500;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--text-muted); transition: color 0.2s;
      text-decoration: none;
    }
    .nav-links a:hover { color: var(--gold); }

    /* ── Breadcrumb ──────────────────────────────────────── */
    .breadcrumb {
      padding: 5.5rem 2.5rem 0;
      font-size: 0.75rem; letter-spacing: 0.08em;
      color: var(--text-dim);
    }
    .breadcrumb a { color: var(--text-dim); text-decoration: none; }
    .breadcrumb a:hover { color: var(--gold); }
    .breadcrumb span { margin: 0 0.5rem; }

    /* ── Product layout ──────────────────────────────────── */
    .product-page {
      max-width: 1100px; margin: 0 auto;
      padding: 2rem 2rem 6rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: start;
    }

    /* ── Image panel ─────────────────────────────────────── */
    .product-gallery {}
    .product-main-img {
      width: 100%; aspect-ratio: 4/3;
      object-fit: cover;
      border-radius: var(--radius-lg);
      background: var(--black-card);
      border: 1px solid var(--border);
    }
    .product-img-placeholder {
      width: 100%; aspect-ratio: 4/3;
      background: linear-gradient(135deg, #1c160c 0%, #241c10 50%, #1a1408 100%);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    .product-img-placeholder::before {
      content: '';
      position: absolute; inset: 0;
      background:
        repeating-linear-gradient(90deg, transparent 0px, transparent 18px, rgba(158,120,50,0.04) 18px, rgba(158,120,50,0.04) 19px),
        repeating-linear-gradient(0deg,  transparent 0px, transparent 18px, rgba(158,120,50,0.04) 18px, rgba(158,120,50,0.04) 19px);
    }
    .product-img-placeholder span {
      font-size: 0.7rem; font-weight: 600;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--text-dim); position: relative; z-index: 1;
    }

    /* ── Info panel ──────────────────────────────────────── */
    .product-info { padding-top: 0.5rem; }
    .product-eyebrow {
      font-size: 0.7rem; font-weight: 500;
      letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 0.75rem;
    }
    .product-name {
      font-family: var(--font-heading);
      font-size: clamp(1.8rem, 3vw, 2.5rem);
      font-weight: 900; line-height: 1.05;
      color: var(--text); margin-bottom: 0.5rem;
    }
    .product-subtitle {
      font-size: 0.8rem; font-weight: 500;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-dim); margin-bottom: 1.5rem;
    }
    .product-price {
      font-size: 2rem; font-weight: 700;
      color: var(--gold-pale); margin-bottom: 0.4rem;
    }
    .product-ships {
      font-size: 0.75rem; color: var(--text-dim);
      letter-spacing: 0.05em; margin-bottom: 2rem;
    }
    .product-divider {
      border: none; border-top: 1px solid var(--border);
      margin: 1.75rem 0;
    }

    /* ── Options ─────────────────────────────────────────── */
    .option-label {
      font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 0.6rem;
      display: block;
    }
    .size-options {
      display: flex; gap: 0.6rem; flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }
    .size-btn {
      padding: 0.55rem 1.1rem;
      background: var(--black-soft);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 0.78rem; font-weight: 500;
      border-radius: var(--radius);
      cursor: pointer; transition: all 0.15s;
    }
    .size-btn:hover { border-color: var(--gold-light); color: var(--text); }
    .size-btn.selected {
      border-color: var(--gold); color: var(--gold);
      background: rgba(158,120,50,0.08);
    }

    .engraving-wrap { margin-bottom: 1.5rem; }
    .engraving-input {
      width: 100%; padding: 0.75rem 1rem;
      background: var(--black-soft);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-body); font-size: 0.95rem;
      outline: none; transition: border-color 0.2s;
      box-sizing: border-box;
    }
    .engraving-input:focus { border-color: var(--gold); }
    .engraving-hint {
      font-size: 0.72rem; color: var(--text-dim);
      margin-top: 0.4rem; text-align: right;
    }

    .qty-wrap {
      display: flex; align-items: center; gap: 0.75rem;
      margin-bottom: 1.75rem;
    }
    .qty-btn {
      width: 2.25rem; height: 2.25rem;
      background: var(--black-soft);
      border: 1px solid var(--border);
      color: var(--text); font-size: 1.1rem;
      border-radius: var(--radius); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s;
    }
    .qty-btn:hover { border-color: var(--gold); }
    .qty-display {
      font-size: 1rem; font-weight: 600;
      color: var(--text); min-width: 1.5rem; text-align: center;
    }

    .btn-add-cart {
      width: 100%; padding: 1rem;
      background: var(--gold);
      color: var(--black);
      border: none; border-radius: var(--radius);
      font-family: var(--font-body);
      font-size: 0.82rem; font-weight: 700;
      letter-spacing: 0.18em; text-transform: uppercase;
      cursor: pointer; transition: background 0.2s;
    }
    .btn-add-cart:hover { background: var(--gold-light); }
    .btn-add-cart:disabled { opacity: 0.5; cursor: default; }
    .add-feedback {
      text-align: center; margin-top: 0.75rem;
      font-size: 0.78rem; color: var(--green-light);
      letter-spacing: 0.08em; min-height: 1.2em;
    }

    /* ── Description ─────────────────────────────────────── */
    .product-description {
      font-size: 0.9rem; line-height: 1.8;
      color: var(--text-muted); margin-bottom: 1.5rem;
    }

    /* ── Care / details strip ────────────────────────────── */
    .product-details {
      display: flex; flex-direction: column; gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .detail-row {
      display: flex; gap: 0.75rem; align-items: baseline;
      font-size: 0.8rem; color: var(--text-muted);
    }
    .detail-row::before {
      content: '—'; color: var(--gold); flex-shrink: 0;
    }

    /* ── Loading / error ─────────────────────────────────── */
    .page-msg {
      padding: 8rem 2rem; text-align: center;
      color: var(--text-muted); font-size: 0.9rem;
    }

    /* ── Footer ──────────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--border);
      padding: 2rem 2.5rem;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 1rem;
    }
    .footer-logo {
      font-family: var(--font-heading); font-size: 0.95rem;
      font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--text-dim);
    }
    footer p { font-size: 0.75rem; color: var(--text-dim); letter-spacing: 0.05em; }

    @media (max-width: 768px) {
      nav { padding: 1rem 1.25rem; }
      .nav-links { gap: 1.25rem; }
      .breadcrumb { padding: 5rem 1.25rem 0; }
      .product-page { grid-template-columns: 1fr; gap: 2rem; padding: 1.5rem 1.25rem 4rem; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/">Graft Wild</a>
  <ul class="nav-links">
    <li><a href="/">Home</a></li>
    <li><a href="/shop">Shop</a></li>
    <li><a href="https://www.instagram.com/stryder.g/" target="_blank" rel="noopener">Instagram</a></li>
    <li><a href="/cart">Cart <span id="cart-count" style="color:var(--gold)"></span></a></li>
  </ul>
</nav>

<div class="breadcrumb">
  <a href="/">Home</a><span>›</span><a href="/shop">Shop</a><span>›</span><span id="breadcrumb-name">Loading...</span>
</div>

<div id="page-content"><div class="page-msg">Loading...</div></div>

<footer>
  <span class="footer-logo">Graft Wild</span>
  <p>© 2026 Graft Wild. Florida Keys.</p>
  <p><a href="mailto:partnerships@graftwild.com" style="color:var(--text-dim)">partnerships@graftwild.com</a></p>
</footer>

<script>
  // ── Helpers ─────────────────────────────────────────────
  function getCart() {
    try { return JSON.parse(localStorage.getItem('gw_cart') || '[]'); } catch { return []; }
  }
  function saveCart(cart) { localStorage.setItem('gw_cart', JSON.stringify(cart)); }
  function formatPrice(cents) { return '$' + (cents / 100).toFixed(0); }
  function updateCartBadge() {
    const count = getCart().reduce((s, i) => s + (i.qty || 1), 0);
    const el = document.getElementById('cart-count');
    if (el) el.textContent = count > 0 ? `(${count})` : '';
  }
  updateCartBadge();

  // ── State ────────────────────────────────────────────────
  let product = null;
  let selectedSizeIndex = 0;
  let qty = 1;

  function currentPrice() {
    if (!product) return 0;
    const adj = product.sizes?.[selectedSizeIndex]?.priceAdjust || 0;
    return product.price + adj;
  }

  function updatePrice() {
    const el = document.getElementById('product-price');
    if (el) el.textContent = formatPrice(currentPrice());
  }

  // ── Build page ───────────────────────────────────────────
  function renderProduct(p) {
    product = p;
    document.title = `${p.name} — Graft Wild`;
    document.getElementById('breadcrumb-name').textContent = p.name;

    const imgEl = p.images?.[0]
      ? `<img class="product-main-img" src="${p.images[0]}" alt="${p.name}" />`
      : `<div class="product-img-placeholder"><span>Photo Coming Soon</span></div>`;

    const sizesHtml = p.sizes && p.sizes.length > 1
      ? `<label class="option-label">Size</label>
         <div class="size-options" id="size-options">
           ${p.sizes.map((s, i) => `
             <button class="size-btn${i === 0 ? ' selected' : ''}" data-index="${i}">
               ${s.label}${s.priceAdjust ? ' (+' + formatPrice(s.priceAdjust) + ')' : ''}
             </button>`).join('')}
         </div>`
      : '';

    const engravingHtml = p.personalization
      ? `<div class="engraving-wrap">
           <label class="option-label" for="engraving-input">${p.personalizationPrompt || 'Engraving (optional)'}</label>
           <input id="engraving-input" class="engraving-input" type="text" maxlength="40" placeholder="e.g. The Smith Family, or leave blank" />
           <div class="engraving-hint"><span id="engraving-count">0</span>/40</div>
         </div>`
      : '';

    document.getElementById('page-content').innerHTML = `
      <div class="product-page">
        <div class="product-gallery">${imgEl}</div>
        <div class="product-info">
          <p class="product-eyebrow">Handcrafted · Laser Engraved</p>
          <h1 class="product-name">${p.name}</h1>
          <p class="product-subtitle">${p.subtitle}</p>
          <div class="product-price" id="product-price">${formatPrice(currentPrice())}</div>
          <p class="product-ships">Ships in ${p.shipsIn || '5–7 business days'}</p>
          <hr class="product-divider" />
          ${sizesHtml}
          ${engravingHtml}
          <label class="option-label">Quantity</label>
          <div class="qty-wrap">
            <button class="qty-btn" id="qty-down">−</button>
            <span class="qty-display" id="qty-display">1</span>
            <button class="qty-btn" id="qty-up">+</button>
          </div>
          <button class="btn-add-cart" id="btn-add-cart">Add to Cart</button>
          <p class="add-feedback" id="add-feedback"></p>
          <hr class="product-divider" />
          <p class="product-description">${p.description}</p>
          <div class="product-details">
            <div class="detail-row">End-grain hardwood construction</div>
            <div class="detail-row">Laser engraved — permanent, food-safe</div>
            <div class="detail-row">Hand wash only, oil occasionally with mineral oil</div>
            <div class="detail-row">Each board is unique — grain varies slightly</div>
          </div>
        </div>
      </div>`;

    attachListeners(p);
  }

  function attachListeners(p) {
    // Size buttons
    document.getElementById('size-options')?.addEventListener('click', e => {
      const btn = e.target.closest('.size-btn');
      if (!btn) return;
      selectedSizeIndex = parseInt(btn.dataset.index);
      document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      updatePrice();
    });

    // Engraving counter
    const engInput = document.getElementById('engraving-input');
    engInput?.addEventListener('input', () => {
      document.getElementById('engraving-count').textContent = engInput.value.length;
    });

    // Qty
    document.getElementById('qty-down').addEventListener('click', () => {
      if (qty > 1) { qty--; document.getElementById('qty-display').textContent = qty; }
    });
    document.getElementById('qty-up').addEventListener('click', () => {
      if (qty < 10) { qty++; document.getElementById('qty-display').textContent = qty; }
    });

    // Add to cart
    document.getElementById('btn-add-cart').addEventListener('click', () => {
      const engraving = document.getElementById('engraving-input')?.value.trim() || '';
      const size = p.sizes?.[selectedSizeIndex]?.label || '';
      const cart = getCart();

      // Match existing item (same product + size + engraving)
      const existing = cart.find(i =>
        i.productId === p.id &&
        i.sizeIndex === selectedSizeIndex &&
        i.engraving === engraving
      );

      if (existing) {
        existing.qty = (existing.qty || 1) + qty;
      } else {
        cart.push({
          productId:  p.id,
          name:       p.name,
          subtitle:   p.subtitle,
          size,
          sizeIndex:  selectedSizeIndex,
          engraving,
          qty,
          price:      currentPrice(),
        });
      }

      saveCart(cart);
      updateCartBadge();

      const fb = document.getElementById('add-feedback');
      const btn = document.getElementById('btn-add-cart');
      btn.disabled = true;
      btn.textContent = '✓ Added to Cart';
      fb.textContent = engraving ? `Engraving: "${engraving}"` : 'Free engraving — add text anytime in cart';
      setTimeout(() => {
        btn.disabled = false;
        btn.textContent = 'Add to Cart';
      }, 2000);
    });
  }

  // ── Load product ─────────────────────────────────────────
  async function init() {
    const params = new URLSearchParams(location.search);
    const id = params.get('id');

    if (!id) {
      document.getElementById('page-content').innerHTML =
        '<div class="page-msg">No product specified. <a href="/shop" style="color:var(--gold)">Back to shop →</a></div>';
      return;
    }

    try {
      const res = await fetch('/api/products');
      const products = await res.json();
      const p = products.find(pr => pr.id === id);
      if (!p) throw new Error('Not found');
      renderProduct(p);
    } catch {
      document.getElementById('page-content').innerHTML =
        '<div class="page-msg">Product not found. <a href="/shop" style="color:var(--gold)">Back to shop →</a></div>';
    }
  }

  init();
</script>
</body>
</html>
